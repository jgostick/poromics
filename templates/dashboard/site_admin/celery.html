{% extends "web/app/app_base.html" %}
{% load i18n %}
{% block app %}
<section class="app-card">
  <h1 class="pg-title">{% translate "Site Admin — Celery" %}</h1>

  {% include "dashboard/site_admin/_subnav.html" %}
  <div class="mb-4 flex justify-end">
    <button
      class="btn btn-sm"
      hx-get="{% url 'dashboard:admin_celery_status' %}"
      hx-target="#celery-status"
      hx-swap="innerHTML">
      <i class="fa fa-refresh mr-1"></i>{% translate "Refresh now" %}
    </button>
  </div>

  <div
    id="celery-status"
    hx-get="{% url 'dashboard:admin_celery_status' %}"
    hx-trigger="load, every 30s"
    hx-swap="innerHTML">
    <div class="flex items-center gap-3 py-6">
      <span class="loading loading-spinner loading-md" aria-hidden="true"></span>
      <p class="opacity-70">{% translate "Loading Celery status..." %}</p>
    </div>
  </div>
</section>
{% endblock %}
