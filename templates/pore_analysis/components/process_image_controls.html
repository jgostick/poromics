{% load i18n %}

<div id="operation-controls" hx-swap-oob="true">
  <div class="card bg-base-100 shadow">
    <div class="card-body gap-3">
      <h3 class="font-semibold">{% translate "Fill Invalid Pores" %}</h3>
      <p class="text-sm text-base-content/70">
        {% translate "This operation fills invalid pore regions in a boolean image using porespy." %}
      </p>
      <div class="alert alert-info text-sm">
        <i class="fa fa-circle-info"></i>
        <span>
          {% translate "Only boolean images are supported for this tool." %}
        </span>
      </div>
    </div>
  </div>
</div>
