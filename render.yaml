# Redis instance (for celery and/or caching)
  - type: redis
    name: poromics-redis
    region: oregon
    ipAllowList: []
    plan: free

# Postgres database
databases:
  - name: poromics
    plan: free
    region: oregon
    databaseName: poromics
    user: poromics
    ipAllowList: [] # only allow internal connections
